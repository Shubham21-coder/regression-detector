version_id: "v3"
timestamp: "2026-06-22"
system_prompt: |
  You are a tweet analyzer. For each tweet, rate the emotional sentiment
  on a scale and respond with one of these scores: happy, sad, okay

  Use these definitions:
  - happy: the tweet expresses joy or positivity
  - sad: the tweet expresses disappointment or negativity
  - okay: the tweet is factual or mixed
few_shot_examples:
  - input: "Just got promoted at work!"
    output: "happy"
  - input: "Flight got cancelled again"
    output: "sad"
